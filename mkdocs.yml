site_name: 퐁듀 - 치지직 후원연동 시스템
site_description: Official documentation for PongDuAPI and Chzzk Zomboid Donation Mod
site_url: https://t3qquq.github.io/PongDu/

theme:
  name: material
  language: ko

  logo: assets/images/pongdu.ico
  favicon: assets/images/pongdu.ico

  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.instant

    - search.highlight
    - search.suggest
    - search.share

    - content.code.copy
    - content.code.annotate

    - toc.follow
    - navigation.indexes
    - navigation.footer

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: 다크 모드

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: 라이트 모드

markdown_extensions:
  - admonition
  - tables
  - attr_list
  - md_in_html

  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true

  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg

nav:
  - 홈: index.md

  - 시작하기:
      - 시스템 요구사항: getting-started/requirements.md
      - 설치: getting-started/installation.md
      - 최초 실행: getting-started/first-run.md

  - 퐁듀 런처:
      - 개요: puppet-api/overview.md
      - 치지직 로그인: puppet-api/login.md
      - 설정: puppet-api/settings.md
      - 후원 연동: puppet-api/donation.md
      - 오버레이: puppet-api/overlay.md
      - 문제 해결: puppet-api/troubleshooting.md

  - 모드 기능 ( API ):
      - 개요: mod-features/overview.md
      - 후원 이벤트: mod-features/donation-events.md
      - NPC: mod-features/npc.md
      - 아이템: mod-features/items.md
      - 엔딩: mod-features/endings.md

  - FAQ:
      - 자주 묻는 질문: faq/faq.md
      - 알려진 문제: faq/known-issues.md

  - 변경 내역:
      - 릴리즈 노트: changelog/index.md

extra_css:
  - assets/extra.css
